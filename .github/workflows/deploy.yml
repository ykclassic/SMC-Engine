name: CD - Deploy Nexus Engine

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # <--- THIS ADDS THE "RUN WORKFLOW" BUTTON
    inputs:
      reason:
        description: 'Reason for manual deploy'
        required: false
        default: 'Manual trigger from GitHub UI'

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    
    # Preventing concurrent deploys to avoid state corruption
    concurrency: 
      group: production
      cancel-in-progress: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Build Docker Image
        run: |
          docker build -t nexus-smc-engine .
      
      # For TechSolute deployment, you can add your specific provider steps here
      # e.g., Render, Railway, or AWS.
      - name: Deployment Status
        run: echo "Deployment triggered successfully: ${{ github.event.inputs.reason }}"
