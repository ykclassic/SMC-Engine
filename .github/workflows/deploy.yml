name: CD - Deploy Nexus Engine

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_smoke_test:
        description: 'Run API Smoke Test before deploy?'
        required: true
        type: boolean
        default: true

jobs:
  deploy:
    name: Production Deployment
    runs-on: ubuntu-latest
    
    # Ensures only one deployment runs at a time
    concurrency:
      group: production-deploy
      cancel-in-progress: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute API Smoke Test
        # Runs if manually triggered with 'true' OR if triggered by a push
        if: ${{ github.event.inputs.run_smoke_test != 'false' }}
        env:
          EXCHANGE_API_KEY: ${{ secrets.EXCHANGE_API_KEY }}
          EXCHANGE_API_SECRET: ${{ secrets.EXCHANGE_API_SECRET }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scripts/smoke_test.py

      - name: Build Docker Container
        run: |
          docker build -t nexus-smc-engine:latest .
          echo "Build successful for TechSolute production."

      - name: Finalize Deployment
        run: |
          echo "Nexus Engine is now live."
          # Insert your specific VPS/Cloud deploy command here
