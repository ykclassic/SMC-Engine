name: Weekly Strategy Backtest

on:
  schedule:
    - cron: '0 12 * * 0' # Every Sunday at Noon
  workflow_dispatch: # Manual trigger

jobs:
  run-backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Create Missing Init Files
        run: |
          # Ensures Python treats directories as packages
          touch core/__init__.py models/__init__.py utils/__init__.py data/__init__.py

      - name: Execute Backtest
        env:
          EXCHANGE_API_KEY: ${{ secrets.EXCHANGE_API_KEY }}
          EXCHANGE_API_SECRET: ${{ secrets.EXCHANGE_API_SECRET }}
          EXCHANGE_PASSPHRASE: ${{ secrets.EXCHANGE_PASSPHRASE }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PYTHONPATH: .  # <--- CRITICAL FIX for ModuleNotFoundError
        run: python scripts/run_backtest.py

      - name: Upload Results Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backtest-report
          path: reports/backtest_results.csv
