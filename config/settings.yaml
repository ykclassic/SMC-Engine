# Append these to your existing settings.yaml
confluence:
  require_macro_alignment: true   # Must trade in direction of 4H BOS
  entry_confirmation: "sweep"     # Options: "sweep" (Liquidity) or "touch" (OB)
  max_signal_age_candles: 3       # How many candles after a 15m BOS to alert
# Append these to your existing settings.yaml
discord:
  webhook_url: "YOUR_DISCORD_WEBHOOK_HERE" # Usually loaded via .env
  username: "Nexus SMC Bot"
  avatar_url: "https://your-logo-url.com/logo.png"
  color_long: 0x00ff00 # Green
  color_short: 0xff0000 # Red

risk_management:
  default_tp_rr: 3.0           # Default 1:3 Risk/Reward ratio
  stop_loss_buffer: 0.001     # 0.1% buffer below/above Order Block
